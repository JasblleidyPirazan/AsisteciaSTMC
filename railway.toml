[build]
  builder = "nixpacks"
  buildCommand = "cd client && npm install && npm run build && cd ../server && npm install && npx prisma generate --schema src/prisma/schema.prisma"

[deploy]
  startCommand = "cd server && sh start.sh"
  restartPolicyType = "ON_FAILURE"
  restartPolicyMaxRetries = 3

[env]
  NODE_ENV = "production"
  PORT = "3000"
