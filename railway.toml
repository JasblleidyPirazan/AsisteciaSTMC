[build]
  builder = "nixpacks"
  buildCommand = "cd client && npm install && npm run build && cd ../server && npm install && npx prisma generate"

[deploy]
  startCommand = "node server/src/index.js"
  restartPolicyType = "ON_FAILURE"
  restartPolicyMaxRetries = 3

[env]
  NODE_ENV = "production"
  PORT = "3000"
